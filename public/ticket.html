<!DOCTYPE html>
<html lang="sr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moje Karte :: FilmBox</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body data-bs-theme="dark">
    <div class="container">
        <p>Dodaj placanje, brisanje i prikaz detalja pritiskom na qr kod dugme</p>
        <div class="card">
            <div class="card-header fw-bold">
                Moje Karte
            </div>
            <div class="card-body">
                <table class="table">
                    <thead>
                        <tr>
                            <th scope="col">#</th>
                            <th scope="col">Film</th>
                            <th scope="col">Bioskop</th>
                            <th scope="col">Vreme</th>
                            <th scope="col">Status</th>
                            <th scope="col">Opcije</th>
                        </tr>
                    </thead>
                    <tbody id="tickets"></tbody>
                </table>
            </div>
            <div class="card-footer">
                <a href="#" class="btn btn-primary">Dodaj Kartu</a>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/js/utils.js"></script>
    <script>
        const table = document.getElementById('tickets')

        function pay(id) {
            showConfirm(`Plati kartu ${id}?`, () => {
                fetch(`api/ticket/${id}/pay`, { method: 'put' })
                    .then(data => window.location.reload())
            })
        }

        function remove(id) {
            showConfirm(`Obrisi kartu ${id}?`, () => {
                fetch(`api/ticket/${id}`, { method: 'delete' })
                    .then(data => window.location.reload())
            })
        }

        retrieveData('/api/ticket', (data) => {
            let content = ''
            for (let ticket of data) {
                content += `
          <tr>
            <th scope="row">${ticket.ticketId}</th>
            <td>${ticket.timeTable.movie.title}</td>
            <td>${ticket.timeTable.cinema.name}</td>
            <td>${ticket.timeTable.cinema.name}</td>
            <td>${ticket.timeTable.timeStart}</td>
            <td>${ticket.paidAt != null ? 
                '<span class="text-success fw-bold">Plaćeno</span>' : 
                '<span class="text-danger fw-bold">Nije Plaćeno</span>'
                }</td>
            <td>${renderButtons(ticket)}</td>
          </tr>`
            }
            table.innerHTML = content
        })

        function renderButtons(ticket) {
            if(ticket.paidAt == null){
                return `
                <div class="btn-group">
                    <button class="btn btn-sm btn-success" type="button" onclick="pay(${ticket.ticketId})">
                        <i class="fa-solid fa-credit-card"></i>
                    </button> 
                    <button class="btn btn-sm btn-danger" type="button" onclick="remove(${ticket.ticketId})">
                        <i class="fa-solid fa-trash-can"></i>
                    </button> 
                </div>
                `
            }else{
                return `
                <div class="btn-group"> 
                    <a class="btn btn-sm btn-info" href="#">
                        <i class="fa-solid fa-qrcode"></i>
                    </a>
                </div>
                `
            }
        }
    </script>

</body>

</html>
